name: Build and Export Docker Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          path: user-repo

      - name: Checkout source repository
        uses: actions/checkout@v4
        with:
          repository: AsyncFuncAI/deepwiki-open
          path: src-repo

      - name: Copy custom Dockerfile
        run: cp user-repo/Dockerfile src-repo/Dockerfile

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: src-repo
          file: src-repo/Dockerfile
          platforms: linux/amd64
          tags: app-image:latest
          outputs: type=docker,dest=/tmp/docker-image-amd64.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image-amd64
          path: /tmp/docker-image-amd64.tar
          retention-days: 7
