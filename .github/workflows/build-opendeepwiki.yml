env:
  UPSTREAM_REPO: https://github.com/AIDotNet/OpenDeepWiki.git
  GIT_REF: ${{ inputs.git_ref || 'main' }}
  REGISTRY: crpi-j9ha7sxwhatgtvj4.cn-shenzhen.personal.cr.aliyuncs.com
  REGISTRY_NS: open-deepwiki
  BACKEND_IMAGE: opendeepwiki
  FRONTEND_IMAGE: opendeepwiki-web

jobs:
  # ──────────────────────────────────────────────
  # Job 1: 构建后端 .NET 镜像
  # ──────────────────────────────────────────────
  build-backend:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: 释放磁盘空间
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost
          sudo apt-get clean
          df -h /

      - name: 克隆上游仓库
        run: |
          git clone --branch ${{ env.GIT_REF }} --depth 1 ${{ env.UPSTREAM_REPO }} source
          echo "✅ 已克隆 OpenDeepWiki @ ${{ env.GIT_REF }}"

      - name: 提取版本号
        id: version
        working-directory: source
        shell: bash
        run: |
          # 从 Directory.Packages.props 提取 Version
          VERSION=$(grep -oP '<Version>\K[^<]+' Directory.Packages.props | head -1)
          if [ -z "$VERSION" ]; then
            VERSION="${{ env.GIT_REF }}"
          fi
          # 去掉开头的 v（如有）
          VERSION="${VERSION#v}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "📦 版本: ${VERSION}"

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录镜像仓库
        if: inputs.push_registry == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ALIYUN_CR_USERNAME }}
          password: ${{ secrets.ALIYUN_CR_PASSWORD }}

      - name: 构建后端镜像（opendeepwiki）
        uses: docker/build-push-action@v5
        with:
          context: ./source
          file: ./source/src/OpenDeepWiki/Dockerfile
          platforms: linux/amd64
          push: ${{ inputs.push_registry == 'true' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.REGISTRY_NS }}/${{ env.BACKEND_IMAGE }}:latest
            ${{ env.REGISTRY }}/${{ env.REGISTRY_NS }}/${{ env.BACKEND_IMAGE }}:${{ steps.version.outputs.version }}
          no-cache: true
          outputs: ${{ inputs.push_registry != 'true' && format('type=docker,dest=/tmp/{0}.tar', env.BACKEND_IMAGE) || '' }}

      - name: 上传后端镜像 Artifact
        if: inputs.push_registry != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BACKEND_IMAGE }}-${{ steps.version.outputs.version }}
          path: /tmp/${{ env.BACKEND_IMAGE }}.tar
          retention-days: 7
          compression-level: 6

  # ──────────────────────────────────────────────
  # Job 2: 构建前端 Next.js 镜像
  # ──────────────────────────────────────────────
  build-frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: 释放磁盘空间
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost
          sudo apt-get clean
          df -h /

      - name: 克隆上游仓库
        run: |
          git clone --branch ${{ env.GIT_REF }} --depth 1 ${{ env.UPSTREAM_REPO }} source
          echo "✅ 已克隆 OpenDeepWiki @ ${{ env.GIT_REF }}"

      - name: 提取版本号
        id: version
        working-directory: source
        shell: bash
        run: |
          VERSION=$(grep -oP '<Version>\K[^<]+' source/Directory.Packages.props 2>/dev/null || echo "${{ env.GIT_REF }}")
          VERSION="${VERSION#v}"
          # fallback
          if [ -z "$VERSION" ]; then VERSION="2.0.1"; fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "📦 版本: ${VERSION}"

