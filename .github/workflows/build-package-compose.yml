name: 拉取并打包 Compose 镜像（opendeepwiki + web）- 2026-03-04

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Aliyun Container Registry
        uses: docker/login-action@v3
        with:
          registry: crpi-j9ha7sxwhatgtvj4.cn-shenzhen.personal.cr.aliyuncs.com
          username: ${{ secrets.ALIYUN_CR_USERNAME }}
          password: ${{ secrets.ALIYUN_CR_PASSWORD }}

      - name: Pull images using Docker Compose
        run: docker compose -f compose.yaml pull

      - name: Save Docker images to tar files
        run: |
          docker save -o /tmp/opendeepwiki.tar crpi-j9ha7sxwhatgtvj4.cn-shenzhen.personal.cr.aliyuncs.com/open-deepwiki/opendeepwiki
          docker save -o /tmp/opendeepwiki-web.tar crpi-j9ha7sxwhatgtvj4.cn-shenzhen.personal.cr.aliyuncs.com/open-deepwiki/opendeepwiki-web

      - name: Upload opendeepwiki image artifact
        uses: actions/upload-artifact@v4
        with:
          name: opendeepwiki-image
          path: /tmp/opendeepwiki.tar
          retention-days: 7

      - name: Upload web image artifact
        uses: actions/upload-artifact@v4
        with:
          name: opendeepwiki-web-image
          path: /tmp/opendeepwiki-web.tar
          retention-days: 7
