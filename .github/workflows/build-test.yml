name: 构建 AIDotNet/OpenDeepWiki 镜像

on:
  workflow_dispatch:
    inputs:
      git_ref:
        description: '发布版本号 / 分支'
        required: false
        default: 'main'
        type: string
      push_registry:
        description: '推送到镜像库'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

env:
  UPSTREAM_REPO: https://github.com/AIDotNet/OpenDeepWiki.git
  GIT_REF: ${{ inputs.git_ref }}
  REGISTRY: crpi-j9ha7sxwhatgtvj4.cn-shenzhen.personal.cr.aliyuncs.com
  REGISTRY_NS: open-deepwiki
  BACKEND_IMAGE: opendeepwiki
  FRONTEND_IMAGE: opendeepwiki-web

jobs:
  build-and-export:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: 清理磁盘空间
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost
          sudo apt-get clean

      - name: 克隆项目源码
        run: |
          git clone --branch ${{ env.GIT_REF }} --depth 1 ${{ env.UPSTREAM_REPO }} source

      - name: 获取版本号信息
        id: meta
        working-directory: source
        run: |
          VERSION=$(grep -oP '<Version>\K[^<]+' Directory.Packages.props 2>/dev/null | head -1 || echo "latest")
          VERSION="${VERSION#v}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: 强制修复前端 Dockerfile (npm ci -> npm install)
        working-directory: source/web
        run: |
          sed -i 's/RUN npm ci/RUN npm install --legacy-peer-deps/' Dockerfile

      - name: 配置 Docker 环境
        uses: docker/setup-buildx-action@v3

      - name: 登录镜像库
        if: inputs.push_registry == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ALIYUN_CR_USERNAME }}
          password: ${{ secrets.ALIYUN_CR_PASSWORD }}

      - name: 🚀 构建并输出 后端镜像 (.NET)
        uses: docker/build-push-action@v5
        with:
          context: ./source
          file: ./source/src/OpenDeepWiki/Dockerfile
          platforms: linux/amd64
          push: ${{ inputs.push_registry == 'true' }}
          tags: ${{ env.REGISTRY }}/${{ env.REGISTRY_NS }}/${{ env.BACKEND_IMAGE }}:${{ steps.meta.outputs.version }}
          no-cache: true
          outputs: ${{ inputs.push_registry != 'true' && format('type=docker,dest=/tmp/{0}.tar', env.BACKEND_IMAGE) || '' }}

      - name: 🚀 构建并输出 前端镜像 (Next.js)
        uses: docker/build-push-action@v5
        with:
          context: ./source/web
          file: ./source/web/Dockerfile
          platforms: linux/amd64
          push: ${{ inputs.push_registry == 'true' }}
          tags: ${{ env.REGISTRY }}/${{ env.REGISTRY_NS }}/${{ env.FRONTEND_IMAGE }}:${{ steps.meta.outputs.version }}
          no-cache: true
          outputs: ${{ inputs.push_registry != 'true' && format('type=docker,dest=/tmp/{0}.tar', env.FRONTEND_IMAGE) || '' }}

      - name: 📦 上传后端产物
        if: inputs.push_registry != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: backend-image-${{ steps.meta.outputs.version }}
          path: /tmp/${{ env.BACKEND_IMAGE }}.tar
          retention-days: 3

      - name: 📦 上传前端产物
        if: inputs.push_registry != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: frontend-image-${{ steps.meta.outputs.version }}
          path: /tmp/${{ env.FRONTEND_IMAGE }}.tar
          retention-days: 3
