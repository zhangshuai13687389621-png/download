name: Build DeepWiki Docker Image

on:
  # 每周一自动构建（跟踪上游更新）
  schedule:
    - cron: '0 2 * * 1'
  # 手动触发
  workflow_dispatch:
    inputs:
      push_registry:
        description: '是否推送到镜像仓库'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'
      image_tag:
        description: '镜像 Tag（留空则使用日期+SHA）'
        required: false
        default: ''
        type: string
  # 推送到 main 时自动构建
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
      - '.github/workflows/build-deepwiki.yml'

env:
  IMAGE_NAME: deepwiki
  REGISTRY: crpi-j9ha7sxwhatgtvj4.cn-shenzhen.personal.cr.aliyuncs.com
  REGISTRY_NAMESPACE: open-deepwiki

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: 释放磁盘空间
        run: |
          echo "=== 清理前磁盘空间 ==="
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost
          sudo apt-get clean
          echo "=== 清理后磁盘空间 ==="
          df -h /

      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 QEMU（多平台支持）
        uses: docker/setup-qemu-action@v3

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 生成镜像 Tag
        id: meta
        run: |
          DATE_TAG=$(date +%Y%m%d)
          SHORT_SHA=${GITHUB_SHA::7}
          
          if [ -n "${{ inputs.image_tag }}" ]; then
            VERSION="${{ inputs.image_tag }}"
          else
            VERSION="${DATE_TAG}-${SHORT_SHA}"
          fi
          
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "date_tag=${DATE_TAG}" >> $GITHUB_OUTPUT
          echo "📦 镜像版本: ${VERSION}"

      - name: 登录镜像仓库
        if: inputs.push_registry == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ALIYUN_CR_USERNAME }}
          password: ${{ secrets.ALIYUN_CR_PASSWORD }}

      - name: 构建 Docker 镜像
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: ${{ inputs.push_registry == 'true' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.REGISTRY_NAMESPACE }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.REGISTRY_NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
          no-cache: true
          outputs: ${{ inputs.push_registry != 'true' && format('type=docker,dest=/tmp/{0}.tar', env.IMAGE_NAME) || '' }}

      - name: 上传镜像 Artifact
        if: inputs.push_registry != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.IMAGE_NAME }}-${{ steps.meta.outputs.version }}
          path: /tmp/${{ env.IMAGE_NAME }}.tar
          retention-days: 7
          compression-level: 6

      - name: 构建摘要
        run: |
          echo "## 🐳 构建完成" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 项目 | 值 |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| 镜像名称 | \`${{ env.IMAGE_NAME }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 版本 | \`${{ steps.meta.outputs.version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 平台 | \`linux/amd64\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 推送仓库 | \`${{ inputs.push_registry == 'true' && '✅ 是' || '❌ 否（仅 Artifact）' }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Dockerfile | \`./Dockerfile\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 上游仓库 | \`AsyncFuncAI/deepwiki-open\` |" >> $GITHUB_STEP_SUMMARY
